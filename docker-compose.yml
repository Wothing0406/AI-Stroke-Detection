services:
  backend:
    build: 
      context: ./backend
    restart: always
    volumes:
      - backend_data:/app/reports
      - backend_uploads:/app/temp_uploads
    environment:
      - PORT=8000
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --url http://frontend:80
    depends_on:
      - frontend

volumes:
  backend_data:
  backend_uploads:
